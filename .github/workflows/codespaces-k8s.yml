name: Codespaces K8s Bootstrap Check

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".devcontainer/**"
      - ".github/workflows/codespaces-k8s.yml"
      - "lecture*/**/*.yml"
      - "lecture*/**/*.yaml"
      - "virtualbox/**"
      - "vmware/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".devcontainer/**"
      - ".github/workflows/codespaces-k8s.yml"
      - "lecture*/**/*.yml"
      - "lecture*/**/*.yaml"
      - "virtualbox/**"
      - "vmware/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  devcontainer-k8s-smoke:
    runs-on: ubuntu-latest
    # Codespaces target: 4-core / 16 GB (hostRequirements in devcontainer.json)
    # CI runs on ubuntu-latest (2-core) which is sufficient for tool-chain smoke tests.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build devcontainer and verify k8s toolchain
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |
            set -euo pipefail
            bash .devcontainer/post-create.sh --ci
            kubectl version --client
            helm version --short
            kind version
            while IFS= read -r manifest; do
              if grep -Eq '^[[:space:]]*apiVersion:' "${manifest}" && grep -Eq '^[[:space:]]*kind:' "${manifest}"; then
                kubectl apply --dry-run=client -f "${manifest}" >/dev/null
              fi
            done < <(find lecture* -type f \( -name '*.yml' -o -name '*.yaml' \) ! -name '*Zone.Identifier' | sort)
